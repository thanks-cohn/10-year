name: Date Reveal Switch

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 6:00 AM UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  switch-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check current date and replace pages
        shell: bash
        run: |
          set -euo pipefail

          TZ="America/Chicago"

          REQUIRED_FILES=(
            "date.txt"
            "placeholder.html"
            "reveal.html"
            "index.html"
            "mobile.html"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "$file not found"
              exit 1
            fi
          done

          TARGET_DATE="$(tr -d '[:space:]' < date.txt)"
          CURRENT_DATE="$(TZ="$TZ" date +%F)"

          echo "Current date: $CURRENT_DATE"
          echo "Target date from date.txt: $TARGET_DATE"

          TARGET_SECONDS="$(date -d "$TARGET_DATE" +%s)"
          CURRENT_SECONDS="$(TZ="$TZ" date -d "$CURRENT_DATE" +%s)"

          DIFF_SECONDS=$(( TARGET_SECONDS - CURRENT_SECONDS ))
          DIFF_DAYS=$(( DIFF_SECONDS / 86400 ))

          if [ "$DIFF_DAYS" -lt 0 ]; then
            ABS_DIFF_DAYS=$(( -DIFF_DAYS ))
          else
            ABS_DIFF_DAYS="$DIFF_DAYS"
          fi

          echo "Difference in days: $DIFF_DAYS"
          echo "Absolute difference in days: $ABS_DIFF_DAYS"

          if [ "$ABS_DIFF_DAYS" -le 2 ]; then
            echo "Current date is equal to, or within 2 days of, date.txt."
            echo "Using reveal.html for index.html and mobile.html."

            cp reveal.html index.html
            cp reveal.html mobile.html
          else
            echo "Current date is not within 2 days of date.txt."
            echo "Using placeholder.html for index.html and mobile.html."

            cp placeholder.html index.html
            cp placeholder.html mobile.html
          fi

      - name: Commit updated pages
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet index.html mobile.html; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html mobile.html
          git commit -m "Auto-switch index and mobile pages based on date.txt"
          git push
