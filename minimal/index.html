<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnimePlex Minimal</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="home">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="AnimePlex home">AnimePlex</a>
    <form class="search" role="search">
      <input id="search-input" type="search" placeholder="Search works" autocomplete="off">
    </form>
  </header>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <p class="eyebrow">Minimal Core</p>
      <h1 id="hero-title">Rotunda, library, reader.</h1>
      <p class="lede">A durable vanilla extraction of AnimePlex mechanics from the current JSON and storage sources.</p>
    </section>

    <section class="ad-slot" aria-label="Advertisement placeholder">Ad / block placeholder</section>

    <section class="rotunda" aria-label="Featured works">
      <button class="carousel-control" id="carousel-prev" type="button" aria-label="Previous work">‹</button>
      <div id="carousel-track" class="carousel-track" tabindex="0"></div>
      <button class="carousel-control" id="carousel-next" type="button" aria-label="Next work">›</button>
    </section>

    <section class="library" aria-labelledby="library-title">
      <h2 id="library-title">Works</h2>
      <div id="works-grid" class="works-grid"></div>
    </section>
  </main>

  <template id="work-card-template">
    <a class="work-card">
      <div class="cover"><span>AnimePlex</span></div>
      <strong class="work-title"></strong>
      <small class="work-meta"></small>
    </a>
  </template>

  <script src="assets/app.js" defer></script>
</body>
</html>
