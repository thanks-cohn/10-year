<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnimePlex Reader</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="reader">
  <header class="reader-header">
    <a class="brand" href="index.html">AnimePlex</a>
    <div class="reader-controls">
      <button id="prev-chapter" type="button">← Prev</button>
      <select id="chapter-select" aria-label="Chapter"></select>
      <button id="next-chapter" type="button">Next →</button>
    </div>
  </header>

  <main id="reader-root" class="reader-root">
    <p class="loading">Loading reader…</p>
  </main>

  <script src="assets/app.js" defer></script>
</body>
</html>
